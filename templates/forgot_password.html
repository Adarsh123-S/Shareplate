{% extends "base.html" %}
{% block title %}Forgot Password — SharePlate{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <div class="auth-icon">🔑</div>
      <h1>Reset Password</h1>
      <p>Answer your security question to reset</p>
    </div>
    <form method="POST" class="auth-form">
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" name="email" placeholder="you@example.com" required />
      </div>
      <div class="form-group">
        <label>What is your mother's name?</label>
        <input type="text" name="security_answer" placeholder="Your answer" required />
      </div>
      <div class="form-group">
        <label>New Password</label>
        <input type="password" name="new_password" placeholder="Min. 6 characters" required minlength="6" />
      </div>
      <button type="submit" class="btn-submit">Reset Password →</button>
    </form>
    <p class="auth-switch"><a href="{{ url_for('login') }}">← Back to Login</a></p>
  </div>
</div>
{% endblock %}
