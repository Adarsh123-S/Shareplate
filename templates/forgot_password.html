{% extends "base.html" %}
{% block title %}{{ _('Forgot Password') }} — SharePlate{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <div class="auth-icon">🔑</div>
      <h1>{{ _('Reset Password') }}</h1>
      <p>{{ _('Answer your security question to reset') }}</p>
    </div>
    <form method="POST" class="auth-form">
      <div class="form-group">
        <label>{{ _('Email Address') }}</label>
        <input type="email" name="email" placeholder="you@example.com" required />
      </div>
      <div class="form-group">
        <label>{{ _("What is your mother's name?") }}</label>
        <input type="text" name="security_answer" placeholder="{{ _('Your answer') }}" required />
      </div>
      <div class="form-group">
        <label>{{ _('New Password') }}</label>
        <input type="password" name="new_password" placeholder="{{ _('Min. 6 characters') }}" required minlength="6" />
      </div>
      <button type="submit" class="btn-submit">{{ _('Reset Password') }} →</button>
    </form>
    <p class="auth-switch"><a href="{{ url_for('login') }}">← {{ _('Back to Login') }}</a></p>
  </div>
</div>
{% endblock %}
