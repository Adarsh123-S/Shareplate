{% extends "base.html" %}
{% block title %}{{ _('Donate Food') }} — SharePlate{% endblock %}
{% block content %}
<div class="page-header">
  <div class="section-inner">
    <h1>{{ _('Share Your Food') }} 🍱</h1>
    <p>{{ _('Fill in the details below and your listing goes live instantly.') }}</p>
  </div>
</div>

<div class="form-page">
  <div class="form-card">
    <form method="POST" enctype="multipart/form-data" class="donate-form">
      <div class="form-row">
        <div class="form-group">
          <label>{{ _('Food Name') }} *</label>
          <input type="text" name="food_name" placeholder="{{ _('e.g. Vegetable Biryani') }}" required />
        </div>
        <div class="form-group">
          <label>{{ _('Category') }} *</label>
          <select name="category" required>
            <option value="">{{ _('Select category') }}</option>
            <option>{{ _('Cooked Meal') }}</option>
            <option>{{ _('Snacks') }}</option>
            <option>{{ _('Fruits & Vegetables') }}</option>
            <option>{{ _('Bakery') }}</option>
            <option>{{ _('Beverages') }}</option>
            <option>{{ _('Raw Ingredients') }}</option>
            <option>{{ _('Other') }}</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>{{ _('Quantity') }} *</label>
          <input type="text" name="quantity" placeholder="{{ _('e.g. 5 plates, 2 kg') }}" required />
        </div>
        <div class="form-group">
          <label>{{ _('Available Until') }} *</label>
          <input type="datetime-local" name="expiry" required />
        </div>
      </div>
      <div class="form-group">
        <label>{{ _('Pickup Location') }} *</label>
        <input type="text" name="location" placeholder="{{ _('e.g. 3rd Floor, XYZ Apartments, Koramangala') }}" required />
      </div>
      <div class="form-group">
        <label>{{ _('Contact Number') }} *</label>
        <input type="text" name="contact" placeholder="{{ _('e.g. 9876543210') }}" required />
      </div>
      <div class="form-group">
        <label>📸 {{ _('Food Photo (optional)') }}</label>
        <input type="file" name="image" accept="image/*" class="file-input"/>
        <div class="file-hint">{{ _('JPG, PNG, WEBP — max 5MB') }}</div>
        <div id="image-preview-wrap" style="display:none; margin-top:0.8rem;">
          <img id="image-preview" style="max-width:200px; border-radius:10px;"/>
        </div>
      </div>
      <div class="form-group">
        <label>{{ _('Additional Notes') }}</label>
        <textarea name="notes" rows="3" placeholder="{{ _('Any allergies, preparation info, special instructions...') }}"></textarea>
      </div>
      <div class="form-actions">
        <a href="{{ url_for('dashboard') }}" class="btn-outline">{{ _('Cancel') }}</a>
        <button type="submit" class="btn-submit">{{ _('List Food') }} →</button>
      </div>
    </form>
  </div>
</div>
<script>
document.querySelector('input[name="image"]').addEventListener('change', function(e) {
  const file = e.target.files[0];
  if (file) {
    const reader = new FileReader();
    reader.onload = function(ev) {
      document.getElementById('image-preview').src = ev.target.result;
      document.getElementById('image-preview-wrap').style.display = 'block';
    };
    reader.readAsDataURL(file);
  }
});
</script>
{% endblock %}
