{% extends "base.html" %}
{% block title %}{{ _('Join SharePlate') }}{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <div class="auth-icon">🍱</div>
      <h1>{{ _('Create your account') }}</h1>
      <p>{{ _('Join the community fighting food waste') }}</p>
    </div>
    <form method="POST" class="auth-form">
      <div class="form-group">
        <label>{{ _('Full Name') }}</label>
        <input type="text" name="name" placeholder="Adarsh Gowda" required />
      </div>
      <div class="form-group">
        <label>{{ _('Email Address') }}</label>
        <input type="email" name="email" placeholder="you@example.com" required />
      </div>
      <div class="form-group">
        <label>{{ _('Password') }}</label>
        <input type="password" name="password" placeholder="{{ _('Min. 6 characters') }}" required minlength="6" />
      </div>
      <div class="form-group">
        <label>{{ _('Your Location') }}</label>
        <input type="text" name="location" placeholder="{{ _('e.g. Koramangala, Bengaluru') }}" required />
      </div>
      <div class="form-group">
        <label>{{ _('I want to') }}</label>
        <select name="role">
          <option value="both">{{ _('Both Donate & Receive') }}</option>
          <option value="donor">{{ _('Only Donate Food') }}</option>
          <option value="receiver">{{ _('Only Receive Food') }}</option>
        </select>
      </div>
      <div class="form-group">
        <label>{{ _("Security Question — What is your mother's name?") }}</label>
        <input type="text" name="security_answer" placeholder="{{ _('Your answer') }}" />
      </div>
      <button type="submit" class="btn-submit">{{ _('Create Account') }} →</button>
    </form>
    <p class="auth-switch">{{ _('Already have an account?') }} <a href="{{ url_for('login') }}">{{ _('Login here') }}</a></p>
  </div>
</div>
{% endblock %}
