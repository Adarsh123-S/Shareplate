{% extends "base.html" %}
{% block title %}{{ _('Reset Password') }} — SharePlate{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <div class="auth-icon">🔐</div>
      <h1>{{ _('Set New Password') }}</h1>
      <p>{{ _('Enter your new password below') }}</p>
    </div>
    <form method="POST" class="auth-form">
      <div class="form-group">
        <label>{{ _('New Password') }}</label>
        <input type="password" name="new_password" placeholder="{{ _('Min. 6 characters') }}" required minlength="6" />
      </div>
      <button type="submit" class="btn-submit">{{ _('Save New Password') }} →</button>
    </form>
    <p class="auth-switch"><a href="{{ url_for('login') }}">← {{ _('Back to Login') }}</a></p>
  </div>
</div>
{% endblock %}
